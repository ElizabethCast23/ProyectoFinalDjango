{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'admin/css/dashboard.css' %}">

    <style>
        .panel-personalizado {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        .acciones {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .boton {
            display: inline-block;
            padding: 10px 18px;
            background-color: #417690;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .boton:hover {
            background-color: #205067;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="branding">
            <h1 id="site-name">Dashboard del Blog</h1>
        </div>
    </div>

    <div class="panel-personalizado">
        <h2>Bienvenido, {{ user.username }}</h2>
        <p>Has iniciado sesión correctamente en tu sistema.</p>

        <div class="acciones">
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="boton">Cerrar sesión</button>
            </form>
        </div>
    </div>

</body>
</html>
