{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard del Blog{% endblock %}</title>

    <!-- Estilos base del admin y personalizados -->
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'admin/css/dashboard.css' %}">

    <style>
        /* Estilos adicionales */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .header, .footer {
            background-color: #417690;
            color: white;
            padding: 10px;
        }

        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            display: inline-block;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Dashboard del Blog</h1>
    </div>

    <!-- Navbar -->

    <div class="navbar">
        <a href="{% url 'dashboard' %}">Inicio</a>
        <a href="{% url 'perfil' %}">Perfil</a>  <!-- Enlace al perfil -->
        <a href="{% url 'logout' %}">Cerrar sesión</a>
    </div>

    <!-- Contenido -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2026 Blog Dashboard</p>
    </div>

</body>
</html>
